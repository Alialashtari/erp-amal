# Amal ERP Core - development stack (ADR-007: Docker on VPS; Compose for Phase 1)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: amal
      POSTGRES_PASSWORD: amal_dev_password
      POSTGRES_DB: amal_erp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U amal -d amal_erp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: amal
      MINIO_ROOT_PASSWORD: amal_dev_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://amal:amal_dev_password@postgres:5432/amal_erp?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_TTL_DAYS: '30'
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@amal.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe!12345}
    ports:
      - '3000:3000'

volumes:
  pgdata:
  redisdata:
  miniodata:
