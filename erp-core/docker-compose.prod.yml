# Amal ERP Core — PRODUCTION stack (ADR-007: Docker on VPS).
# Differences from the development compose:
#   - No database/Redis/MinIO ports exposed to the host network.
#   - restart policies, log rotation, healthchecks on every service.
#   - All secrets come from the .env file next to this compose file
#     (env validation refuses default values in production).
#   - TLS termination / reverse proxy is intentionally NOT decided here:
#     OD-7 (API gateway: reverse proxy vs gateway product vs NestJS-level)
#     requires a stakeholder ADR. Until then, front this stack with the
#     operator's TLS terminator of choice on ports 80/443 → api:3000.
#
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-amal_erp}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ops/backup/archive:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: &logging
      driver: json-file
      options: { max-size: '10m', max-file: '5' }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:?set in .env}']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $${REDIS_PASSWORD} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *logging

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-amal_erp}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-amal-erp}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set in .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900s}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      CORS_ORIGINS: ${CORS_ORIGINS:?set in .env}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      THROTTLE_TTL_SECONDS: ${THROTTLE_TTL_SECONDS:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      RECEIPT_FONT_PATH: ${RECEIPT_FONT_PATH:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    # Only the API is reachable from the host; the TLS terminator proxies to it.
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *logging

volumes:
  pgdata:
  redisdata:
  miniodata:
